name: iOS

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project LottieLab.xcodeproj \
            -scheme LottieLab \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            CODE_SIGNING_ALLOWED=NO
